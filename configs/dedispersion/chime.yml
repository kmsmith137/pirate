# Note: params in this file are hardcoded into makefile_helper.py
# (when production_kernels are autogenerated), so any changes made
# here should be reflected there as well.

zone_nfreq: [16384]
zone_freq_edges: [400, 800]
time_sample_ms: 1.0
toplevel_tree_rank: 15
time_samples_per_chunk: 2048
dtype: float16

# No frequency subbands.
frequency_subband_counts: [0,0,0,0,1]

# Each "primary tree" searches a different DM range, ordered from low to high.
# Each "primary tree" is expanded into (num_early_triggers+1) "dedispersion trees".
# (If there are no early triggers, then there is no distinction between a tree
# and a primary tree.)
# FIXME peak-finding params could probably use more thought (same params for each
# primary tree). Note: zeroes mean "let the GPU kernel decide".
primary_trees:
  - {num_early_triggers: 0, max_width: 16, dm_downsampling: 0, time_downsampling: 0, wt_dm_downsampling: 64, wt_time_downsampling: 64}
  - {num_early_triggers: 0, max_width: 16, dm_downsampling: 0, time_downsampling: 0, wt_dm_downsampling: 64, wt_time_downsampling: 64}
  - {num_early_triggers: 0, max_width: 16, dm_downsampling: 0, time_downsampling: 0, wt_dm_downsampling: 64, wt_time_downsampling: 64}
  - {num_early_triggers: 0, max_width: 16, dm_downsampling: 0, time_downsampling: 0, wt_dm_downsampling: 64, wt_time_downsampling: 64}

max_gpu_clag: 3
beams_per_gpu: 250
beams_per_batch: 2
num_active_batches: 2