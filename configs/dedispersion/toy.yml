# Subscale "toy" dedisperser, sometimes convenient for testing.
# Does not need production_kernels=True in makefile_helper.py (unlike the chime/chord files in this directory).

zone_nfreq: [640]
zone_freq_edges: [400, 800]
time_sample_ms: 1.0
tree_rank: 12
time_samples_per_chunk: 256
dtype: float32

frequency_subband_counts: [2,2,1]

# Each "primary tree" searches a different DM range, ordered from low to high.
# Each "primary tree" is expanded into (num_early_triggers+1) "dedispersion trees".
# (If there are no early triggers, then there is no distinction between a tree
# and a primary tree.)
# FIXME peak-finding params could probably use more thought (same params for each
# primary tree). Note: zeroes mean "let the GPU kernel decide".
primary_trees:
  - {num_early_triggers: 0, max_width: 16, dm_downsampling: 0, time_downsampling: 0, wt_dm_downsampling: 16, wt_time_downsampling: 16}
  - {num_early_triggers: 1, max_width: 16, dm_downsampling: 0, time_downsampling: 0, wt_dm_downsampling: 16, wt_time_downsampling: 16}
  - {num_early_triggers: 2, max_width: 16, dm_downsampling: 0, time_downsampling: 0, wt_dm_downsampling: 16, wt_time_downsampling: 16}

max_gpu_clag: 1
beams_per_gpu: 16
beams_per_batch: 2
num_active_batches: 2