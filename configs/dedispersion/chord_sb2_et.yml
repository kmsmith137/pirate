# chord_sb2_et.yml: chord example with 25 subbands and 3 early triggers.
#
# This file format is used for on-disk dedispersion configs, and is one of
# three metadata files sent from pirate to the grouper.
#
# Note: params in this file are hardcoded into makefile_helper.py
# (when production_kernels are autogenerated), so any changes made
# here should be reflected there as well.

# A simple frequency upchannelization scheme, will revisit later (28160 freq channels total).
zone_freq_edges: [300, 350, 450, 600, 800, 1500]
zone_nfreq: [ 8192, 8192, 6144, 2048, 3584 ]   # U = 32,16,8,4,1
time_sample_ms: 1.0

# Let's try to use rank=16 in CHORD.
toplevel_tree_rank: 16
time_samples_per_chunk: 2048
dtype: float16

# Frequency subbands are specified as an integer-valued array. This array
# corresponds to 25 subbands. For details/plots, see notes/tree_dedispersion.tex.
frequency_subband_counts: [5,9,7,3,1]

# Each "primary tree" searches a different DM range, ordered from low to high.
# Each "primary tree" is expanded into (num_early_triggers+1) "dedispersion trees".
# (If there are no early triggers, then there is no distinction between a tree
# and a primary tree.)
#
# The early triggers below start at ~60 sec dedispersion delay.
# See the tex notes or sphinx docs for an explanation of these params.
#
# FIXME peak-finding params could probably use more thought (same params for each
# primary tree). Note: zeroes mean "let the GPU kernel decide".
primary_trees:
  - {num_early_triggers: 0, max_width: 16, dm_downsampling: 0, time_downsampling: 0, wt_dm_downsampling: 64, wt_time_downsampling: 64}
  - {num_early_triggers: 1, max_width: 16, dm_downsampling: 0, time_downsampling: 0, wt_dm_downsampling: 64, wt_time_downsampling: 64}
  - {num_early_triggers: 2, max_width: 16, dm_downsampling: 0, time_downsampling: 0, wt_dm_downsampling: 64, wt_time_downsampling: 64}
  - {num_early_triggers: 3, max_width: 16, dm_downsampling: 0, time_downsampling: 0, wt_dm_downsampling: 64, wt_time_downsampling: 64}

max_gpu_clag: 5
beams_per_gpu: 60
beams_per_batch: 2
num_active_batches: 2
