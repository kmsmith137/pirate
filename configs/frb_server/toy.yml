# Toy config for testing on a single machine with loopback.
# See cf05_production.yml for more info on file format.
#
# To start the server:
#   mkdir -p /dev/shm/pirate_ssd /dev/shm/pirate_nfs
#   pirate_frb run_server configs/frb_server/toy.yml configs/dedispersion/toy.yml
#
# To send fake X-engine data (in a separate terminal):
#   pirate_frb run_fake_xengine configs/frb_server/toy.yml


########################################  General config  ########################################


num_servers: 1
server_cpus: [ 0 ]   # length num_servers

memory_per_server: '10 GB'
use_hugepages: true

# time_samples_per_chunk is no longer specified here -- it lives in the
# DedispersionConfig YAML passed to 'pirate_frb run_server' as the second
# positional arg. 'pirate_frb run_fake_xengine' learns it from the running
# server via the GetConfig RPC.

ringbuf_nchunks: 512


########################################  Network config  ########################################


data_ip_addrs:
  - '127.0.0.1:5000'

rpc_ip_addrs:
  - '127.0.0.1:6000'

min_data_mtu: 1500
min_rpc_mtu: 1500


#####################################  File-writing config  ######################################


ssd_dirs: [ '/dev/shm/pirate_ssd' ]
ssd_devices: [ 'tmpfs' ]
ssd_threads_per_server: 4

nfs_dir: '/dev/shm/pirate_nfs'
nfs_threads_per_server: 2


###################################  "Fake X-engine" config  #####################################
#
# This optional section is only needed if you want to send "fake X-engine" data
# (pirate_frb run_fake_xengine).


beams_per_server: 3
base_beam_id: [ 100 ]    # length num_servers

tcp_connections_per_server: 64

# Frequency channels from xengine_metadata_v1.yml.
zone_nfreq: [8192, 8192, 6144, 2048, 3584]
zone_freq_edges: [300, 350, 450, 600, 800, 1500]
