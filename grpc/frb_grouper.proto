syntax = "proto3";

package frb.grouper.v1;

// Toy CUDA-IPC ring buffer between a C++ producer (gRPC client) and a
// Python consumer (gRPC server). One bidirectional stream per session.
//
// Client -> server:
//   - The FIRST message on every Stream MUST be an IpcHandle.
//   - Every subsequent message is a Produced{slot=N}, sent after the
//     producer has filled ring-buffer slot (N % 5).
//
// Server -> client:
//   - Every message is a Consumed{slot=N}, sent after the consumer has
//     read slot (N % 5).
//
// The server rejects a second concurrent Stream invocation with status
// FAILED_PRECONDITION (the toy supports exactly one client at a time).

service ToyIpcStream {
  rpc Stream(stream ProducerMessage) returns (stream ConsumerMessage);
}

message ProducerMessage {
  oneof kind {
    IpcHandle ipc_handle = 1;
    Produced  produced   = 2;
  }
}

message ConsumerMessage {
  Consumed consumed = 1;
}

// Initial handshake: raw cudaIpcMemHandle_t bytes + CUDA device id.
message IpcHandle {
  bytes handle    = 1;  // sizeof(cudaIpcMemHandle_t) == 64
  int32 device_id = 2;  // CUDA device the buffer was allocated on
}

message Produced { int64 slot = 1; }  // "ring buffer slot N is now produced"
message Consumed { int64 slot = 1; }  // "ring buffer slot N is now consumed"
